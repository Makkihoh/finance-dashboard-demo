  if (holdings.length === 0) {
    html += '<div class="no-holdings">暂无持仓数据</div>';
  }

  el.innerHTML = html;
}

// ── 按市场分组渲染 ──
function renderMarketGroups(groups, allHoldings) {
  var html = '';
  var marketOrder = [
    { key: '美', label: '美股', flag: '🇺🇸', currency: 'USD', symbol: '$', fx: USDCNY },
    { key: '港', label: '港股', flag: '🇭🇰', currency: 'HKD', symbol: 'HK$', fx: HKDCNY },
    { key: 'A',  label: 'A股',  flag: '🇨🇳', currency: 'CNY', symbol: '¥', fx: 1 }
  ];

  marketOrder.forEach(function(mkt) {
    var items = groups[mkt.key] || [];
    if (items.length === 0) return;

    // 市场汇总（原始币种）
    var mktValueLocal = 0, mktPnlLocal = 0;
    items.forEach(function(h) {
      if (h.mergeWith) return;
      var shares = h.shares || 0;
      var price = parseFloat(h.currentPrice) || 0;
      var cost = parseFloat(h.cost) || 0;
      mktValueLocal += shares * price;
      if (shares > 0 && cost > 0) {
        mktPnlLocal += shares * (price - cost);
      }
    });

    html += '<div class="mkt-group">';

    // 市场头部 — 用原始币种
    var mktValStr = mkt.symbol + Math.round(mktValueLocal).toLocaleString('zh-CN');
    var mktPnlStr = mkt.symbol + Math.round(Math.abs(mktPnlLocal)).toLocaleString('zh-CN');
    if (mktPnlLocal > 0) mktPnlStr = '+' + mktPnlStr;
    else if (mktPnlLocal < 0) mktPnlStr = '-' + mktPnlStr;

    html += '<div class="mkt-header" onclick="toggleMktGroup(this)">';
    html += '  <div class="mkt-left">';
    html += '    <span class="mkt-flag">' + mkt.flag + '</span>';
    html += '    <span class="mkt-label">' + mkt.label + '(' + mkt.currency + ')</span>';
    html += '    <span class="mkt-total-val">' + mktValStr + '</span>';
    html += '  </div>';
    html += '  <div class="mkt-right">';
    html += '    <span class="mkt-pnl num ' + pnlClass(mktPnlLocal) + '">' + mktPnlStr + '</span>';
    html += '    <span class="mkt-arrow">▾</span>';
    html += '  </div>';
    html += '</div>';

    // 列标题
    html += '<div class="mkt-body">';
    html += '<div class="tiger-header">';
    html += '  <div>名称 | 代码</div>';
    html += '  <div>持仓 | 市值</div>';
    html += '  <div>当前价 | 成本</div>';
    html += '  <div>持仓盈亏</div>';
    html += '</div>';

    // 持仓行
    items.forEach(function(h) {
      html += renderTigerRow(h);
    });

    html += '</div>'; // mkt-body
    html += '</div>'; // mkt-group
  });

  return html;
}

// ── 按层级分组渲染 ──
function renderLayerGroups(holdings) {
  var html = '';
  var layerKeys = Object.keys(LAYER_META).sort(function(a, b) {
    return (LAYER_META[a].order || 0) - (LAYER_META[b].order || 0);
  });

  layerKeys.forEach(function(lk) {
    var summary = calcLayerSummary(holdings, lk);
    if (summary.count === 0) return;
    var meta = LAYER_META[lk];

    html += '<div class="mkt-group">';

    html += '<div class="mkt-header" onclick="toggleMktGroup(this)">';
    html += '  <div class="mkt-left">';
    html += '    <span class="lh-dot" style="background:' + meta.color + '"></span>';
    html += '    <span class="mkt-label">' + meta.name + '</span>';
    html += '    <span class="mkt-total-val">' + fmtMoneyShort(summary.totalValue) + '</span>';
    html += '  </div>';
    html += '  <div class="mkt-right">';
    var lPnl = summary.totalCost > 0 ? summary.totalValue - summary.totalCost : 0;
    html += '    <span class="mkt-pnl num ' + pnlClass(lPnl) + '">' + fmtMoney(lPnl) + '</span>';
    html += '    <span class="mkt-arrow">▾</span>';
    html += '  </div>';
    html += '</div>';

    html += '<div class="mkt-body">';
    html += '<div class="tiger-header">';
    html += '  <div>名称 | 代码</div>';
    html += '  <div>持仓 | 市值</div>';
    html += '  <div>当前价 | 成本</div>';
    html += '  <div>持仓盈亏</div>';
    html += '</div>';

    summary.holdings.forEach(function(h) {
      html += renderTigerRow(h);
    });

    html += '</div>';
    html += '</div>';
  });

  return html;
}

// ── 单行持仓渲染（老虎风格） ──
function renderTigerRow(h) {
  var mv = calcMarketValue(h);
  var html = '';

  // 合并行（HSBC美股）
  if (mv.merged || h.action === '合并看汇丰总仓') {
    html += '<div class="tiger-row merged-row">';
    html += '<div class="tr-compact">';
    html += '  <div class="tr-col tr-name-col">';
    html += '    <div class="tr-name">' + h.name + '</div>';
    html += '    <div class="tr-code"><span class="hc-market">' + marketLabel(h.market) + '</span> ' + h.code + '</div>';
    html += '  </div>';
    html += '  <div class="tr-col tr-pos-col">';
    html += '    <div class="tr-main">' + fmt(h.shares || 0, 0) + '</div>';
    html += '    <div class="tr-sub">→合并至港股</div>';
    html += '  </div>';
    html += '  <div class="tr-col tr-price-col">';
    html += '    <div class="tr-main">' + formatPrice(h) + '</div>';
    html += '    <div class="tr-sub">' + (h.cost ? fmt(parseFloat(h.cost), 2) : '--') + '</div>';
    html += '  </div>';
    html += '  <div class="tr-col tr-pnl-col"><span class="tr-merged-tag">已合并</span></div>';
    html += '</div>';
    html += '</div>';
    return html;
  }

  var shares = mv.shares || h.shares || 0;
  var hasPosition = shares > 0;
  var hasBuyPlan = h.buyPlan && h.buyPlan.length > 0;
  var price = parseFloat(h.currentPrice) || 0;
  var cost = parseFloat(h.cost) || 0;
  var sym = currSymbol(h.market);

  // 原始币种计算
  var localValue = shares * price;
  var localCost = shares * cost;
  var localPnl = (cost > 0) ? localValue - localCost : 0;
  var pnlPctVal = localCost > 0 ? localPnl / localCost : 0;

  html += '<div class="tiger-row' + (hasPosition || hasBuyPlan ? ' clickable' : '') + '" onclick="toggleHolding(this)">';

  // ── 主体行 ──
  html += '<div class="tr-compact">';

  // 名称列
  html += '<div class="tr-col tr-name-col">';
  html += '  <div class="tr-name">' + h.name + '</div>';
  html += '  <div class="tr-code"><span class="hc-market">' + marketLabel(h.market) + '</span> ' + h.code + '</div>';
  html += '</div>';

  // 持仓/市值列（原始币种）
  html += '<div class="tr-col tr-pos-col">';
  if (hasPosition) {
    html += '  <div class="tr-main num">' + fmt(shares, shares % 1 !== 0 ? 5 : 0) + '</div>';
    html += '  <div class="tr-sub">' + (localValue > 0 ? sym + Math.round(localValue).toLocaleString('zh-CN') : '--') + '</div>';
  } else {
    html += '  <div class="tr-main">--</div>';
    html += '  <div class="tr-sub">' + statusTag(h.status || '') + '</div>';
  }
  html += '</div>';

  // 当前价/成本列
  html += '<div class="tr-col tr-price-col">';
  html += '  <div class="tr-main num">' + (price > 0 ? fmt(price, 2) : '--') + '</div>';
  html += '  <div class="tr-sub">' + (cost > 0 ? fmt(cost, 2) : '--') + '</div>';
  html += '</div>';

  // 盈亏列（原始币种）
  html += '<div class="tr-col tr-pnl-col">';
  if (hasPosition && cost > 0) {
    var pnlStr = sym + Math.round(Math.abs(localPnl)).toLocaleString('zh-CN');
    if (localPnl > 0) pnlStr = '+' + pnlStr;
    else if (localPnl < 0) pnlStr = '-' + pnlStr;
    else pnlStr = sym + '0';
    html += '  <div class="tr-pnl-amt num ' + pnlClass(localPnl) + '">' + pnlStr + '</div>';
    html += '  <div class="tr-pnl-pct num ' + pnlClass(pnlPctVal) + '">' + fmtPct(pnlPctVal) + '</div>';
  } else if (hasPosition) {
    html += '  <div class="tr-pnl-amt">--</div>';
    html += '  <div class="tr-pnl-pct">' + statusTag(h.status || '') + '</div>';
  } else {
    html += '  <div class="tr-pnl-amt">--</div>';
    html += '  <div class="tr-pnl-pct">--</div>';
  }
  html += '</div>';

  html += '</div>'; // tr-compact

  // ── 展开详情 ──
  html += '<div class="holding-detail"><div class="hd-inner">';

  if (hasPosition) {
    if (cost > 0) {
      html += hdRow('成本价', sym + fmt(cost, 2));
      var detailPnlStr = sym + Math.round(Math.abs(localPnl)).toLocaleString('zh-CN');
      html += hdRow('盈亏金额', '<span class="' + pnlClass(localPnl) + '">' + (localPnl >= 0 ? '+' : '-') + detailPnlStr + '</span>');
    }
  }

  // HSBC合并敞口
  if (h.code === '00005' && h.totalPosition) {
    var tp = h.totalPosition;
    html += '<div class="hsbc-mini-warn">';
    html += '  <div class="hw-title">⚠ 港+美合并敞口</div>';
    var hkVal = tp.hk ? tp.hk.valueCNY : 0;
    var usVal = tp.us ? tp.us.valueCNY : 0;
    html += '  <div class="hw-detail">';
    html += '    港股 ' + fmtMoney(hkVal) + ' · 美股 ' + fmtMoney(usVal);
    html += '    · 合计 ' + fmtMoney(tp.totalCNY || (hkVal+usVal));
    html += '  </div>';
    if (tp.pendingOrder) {
      html += '  <div class="hw-order">' + tp.pendingOrder + '</div>';
    }
    html += '</div>';
  }

  if (h.target) html += hdRow('目标仓位', fmtMoney(h.target));
  if (h.action) html += hdRow('操作建议', h.action);

  // 买入计划
  if (hasBuyPlan) {
    html += '<div class="bp-title">分批买入计划</div>';
    html += '<table class="buy-plan-table">';
    html += '<tr><th>批次</th><th>价格</th><th>金额</th><th>备注</th></tr>';
    h.buyPlan.forEach(function(bp) {
      html += '<tr>';
      html += '<td>第' + bp.batch + '笔</td>';
      html += '<td class="num">' + currSymbol(h.market) + fmt(bp.price, 2) + '</td>';
      html += '<td class="num">' + fmtMoney(bp.amount) + '</td>';
      html += '<td class="bp-note">' + (bp.note || '') + '</td>';
      html += '</tr>';
    });
    html += '</table>';
  }

  // 止损/退出/证伪
  if (h.stopLoss || h.exitCondition || h.proofOfInvalidation) {
    html += '<div class="cond-block">';
    if (h.stopLoss) html += '<div><b>止损：</b>' + h.stopLoss + '</div>';
    if (h.exitCondition) html += '<div><b>退出：</b>' + h.exitCondition + '</div>';
    if (h.proofOfInvalidation) html += '<div><b>证伪：</b>' + h.proofOfInvalidation + '</div>';
    html += '</div>';
  }

  if (h.dividend) {
    html += '<div class="cond-block" style="border-left:2px solid var(--color-safety)"><b>分红：</b>' + h.dividend + '</div>';
  }

  if (h.note) {
    html += '<div class="tr-note">💡 ' + h.note + '</div>';
  }

  // 编辑按钮
  var hIdx = DATA.holdings ? DATA.holdings.indexOf(h) : -1;
  if (hIdx >= 0) {
    html += '<div style="display:flex;justify-content:flex-end;gap:var(--sp-sm);margin-top:var(--sp-sm)">';
    html += '  <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteHolding(' + hIdx + ')">删除</button>';
    html += '  <button class="btn btn-sm" onclick="event.stopPropagation();handleEditHolding(' + hIdx + ')">编辑</button>';
    html += '</div>';
  }

  html += '</div></div>'; // hd-inner + holding-detail
  html += '</div>'; // tiger-row
  return html;
}

// ── 辅助函数 ──
function hdRow(label, value) {
  return '<div class="hd-row"><span class="hd-label">' + label + '</span><span class="hd-val">' + value + '</span></div>';
}
function marketLabel(m) {
  if (m === 'A') return 'A';
  if (m === '港') return 'HK';
  if (m === '美') return 'US';
  return m || '';
}
function currSymbol(market) {
  if (market === '美') return '$';
  if (market === '港') return 'HK$';
  return '¥';
}
function formatPrice(h) {
  var p = parseFloat(h.currentPrice);
  if (!p || isNaN(p)) return '--';
  return fmt(p, 2);
}

/* ── 新增持仓 ── */
function handleAddHolding(formData) {
  if (!DATA.holdings) DATA.holdings = [];
  DATA.holdings.push(formData);
  saveData();
  renderHoldings();
  showToast('已添加 ' + (formData.name || ''));
}

/* ── 删除持仓 ── */
async function deleteHolding(idx) {
  if (!DATA.holdings || idx < 0 || idx >= DATA.holdings.length) return;
  var name = DATA.holdings[idx].name || '';
  if (!(await showModalConfirm({message:'确定删除「' + name + '」？',title:'删除持仓',danger:true}))) return;
  DATA.holdings.splice(idx, 1);
  saveData();
  renderHoldings();
  renderDashboard();
  showToast('已删除 ' + name);
}

/* ── 编辑持仓 ── */
function handleEditHolding(idx) {
  if (!DATA.holdings || idx < 0 || idx >= DATA.holdings.length) return;
  var h = DATA.holdings[idx];
  openHoldingForm(h, function(formData) {
    Object.assign(DATA.holdings[idx], formData);
    saveData();
    renderHoldings();
    showToast('已更新 ' + (formData.name || ''));
  });
}

function getBrokerCashCNY() {
  var cb = (DATA.family && DATA.family.cashBreakdown) || {};
  var usd = cb.USD || cb.tigerUSD || 0;
  var hkd = cb.HKD || cb.tigerHKD || 0;

function calcAcctYearStats(records) {
  var currentYear = new Date().getFullYear().toString();
  var totalIncome = 0, totalExpense = 0;
  records.forEach(function(r) {
    if (r.yearMonth && r.yearMonth.startsWith(currentYear)) {
      totalIncome += (r.income || 0);
      totalExpense += (r.expense || 0);
    }
  });
  return { totalIncome: totalIncome, totalExpense: totalExpense, totalSurplus: totalIncome - totalExpense };
}

  formHtml += '  <input class="form-input" id="cashPlatform" value="' + escAttr(acct.platform || '') + '" placeholder="如：支付宝、招行">';
  formHtml += '</div>';
  formHtml += '<div class="form-group">';
  formHtml += '  <label class="form-label">余额</label>';
  formHtml += '  <input class="form-input" id="cashBalance" type="number" step="0.01" value="' + (acct.balance || '') + '" placeholder="0.00">';
  formHtml += '</div>';

  if (isEdit) {
    formHtml += '<div style="margin-top:var(--sp-lg);text-align:center">';
    formHtml += '  <button class="btn btn-danger btn-sm" onclick="deleteCashAccount(' + idx + ')">删除此账户</button>';
    formHtml += '</div>';
  }

  openAccountModal(isEdit ? '编辑账户' : '添加账户', formHtml, function() {
    var name = document.getElementById('cashName').value.trim();
    var platform = document.getElementById('cashPlatform').value.trim();
    var balance = parseFloat(document.getElementById('cashBalance').value) || 0;
    if (!name) { showToast('请填写账户名称'); return false; }

    var now = new Date();
    var dateStr = (now.getMonth() + 1) + '/' + now.getDate();

    if (isEdit) {
      DATA.cashAccounts[idx] = { name: name, platform: platform, balance: balance, updatedAt: dateStr };
    } else {
      DATA.cashAccounts.push({ name: name, platform: platform, balance: balance, updatedAt: dateStr });
    }
    saveData();
    renderAccount();
    renderDashboard();
    showToast(isEdit ? '已更新' : '已添加');
  });
}

async function deleteCashAccount(idx) {
  if (!(await showModalConfirm({message:'确定删除此账户？',title:'删除账户',danger:true}))) return;
  DATA.cashAccounts.splice(idx, 1);
  saveData();
  closeAccountModal();
  renderAccount();
  renderDashboard();
  showToast('已删除');
}

/* ── 获取现金合计（供首页调用）── */
function getCashAccountTotal() {
  var accounts = DATA.cashAccounts || [];
  var total = 0;
  accounts.forEach(function(a) { total += (a.balance || 0); });
  return total;
}

/* ====== 分区二：月度收支（方案C v2 — 动态大卡 + 线状趋势图） ====== */
var _selectedYear = new Date().getFullYear();
var _activeMonth = null;

function _getAvailableYears(records) {
  var years = {};
  records.forEach(function(r) { if (r.yearMonth) years[r.yearMonth.slice(0,4)] = 1; });
  var arr = Object.keys(years);
  var thisYear = String(new Date().getFullYear());
  if (arr.indexOf(thisYear) === -1) arr.push(thisYear);
  return arr.sort(function(a,b) { return b.localeCompare(a); });
}

function _calcMonthStats(records, ym) {
  var income = 0, expense = 0;
  records.forEach(function(r) {
    if (r.yearMonth !== ym) return;
    income += (r.income || 0);
    var cats = r.expenseCategories || {};
    var exp = 0;
    for (var k in cats) exp += (cats[k] || 0);
    if (exp === 0 && r.expense) exp = r.expense;
    expense += exp;
  });
  return { income: income, expense: expense, surplus: income - expense, rate: income > 0 ? Math.round((income - expense) / income * 100) : 0 };
}

function renderMonthlySection() {
  var allRecords = DATA.monthlyRecords || [];
  var availYears = _getAvailableYears(allRecords);
  if (availYears.indexOf(String(_selectedYear)) === -1) {
    _selectedYear = availYears.length > 0 ? parseInt(availYears[0]) : new Date().getFullYear();
  }
  var yearStr = String(_selectedYear);

  var html = '<div class="acct-section">';

  // 筛选当年记录（标题合进卡片里）
  var records = allRecords.filter(function(r) { return r.yearMonth && r.yearMonth.startsWith(yearStr); });

  if (records.length === 0) {
    html += '<div class="acct-section-header"><span class="acct-section-title">月度收支</span><button class="btn btn-primary btn-sm" onclick="openMonthlyForm(null)">+ 记录</button></div>';
    html += '<div class="cash-empty">' + yearStr + '年暂无收支记录，点击「+ 记录」开始</div>';
  } else {
    var monthMap = {};
    records.forEach(function(r) {
      var ym = r.yearMonth || 'unknown';
      if (!monthMap[ym]) monthMap[ym] = [];
      monthMap[ym].push(r);
    });
    var sortedMonths = Object.keys(monthMap).sort(function(a,b) { return b.localeCompare(a); });
    if (!_activeMonth || sortedMonths.indexOf(_activeMonth) === -1) _activeMonth = sortedMonths[0];
    var latestMonth = _activeMonth;

    // ── 大卡（标题+数据+明细合一）──
    var latest = _calcMonthStats(records, latestMonth);
    var monthNum = parseInt(latestMonth.split('-')[1]) || 0;
    
    // 月份选项
    var monthOpts = '';
    for (var mi = 1; mi <= 12; mi++) {
      var mym = yearStr + '-' + String(mi).padStart(2, '0');
      monthOpts += '<option value="' + mym + '"' + (mym === latestMonth ? ' selected' : '') + '>' + mi + '月</option>';
    }

    html += '<div class="ie-hero-card" onclick="toggleHeroDetail()">';
    // 顶部行：月份选择 + 年份选择 + 记录按钮
    html += '  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-md)">';
    html += '    <div style="display:flex;align-items:center;gap:var(--sp-sm)">';
    html += '      <span style="font-size:var(--fs-xs);color:var(--text-muted)">月度收支</span>';
    html += '      <select onchange="event.stopPropagation();switchActiveMonth(this.value)" style="padding:2px 6px;border:1px solid var(--glass-border);border-radius:var(--radius-sm);background:transparent;color:var(--text-primary);font-size:var(--fs-sm);font-weight:700;cursor:pointer;outline:none;-webkit-appearance:none">' + monthOpts + '</select>';
    html += '      <select onchange="event.stopPropagation();_selectedYear=parseInt(this.value);_activeMonth=null;renderAccount();" style="padding:2px 6px;border:1px solid var(--glass-border);border-radius:var(--radius-sm);background:transparent;color:var(--text-muted);font-size:var(--fs-xs);cursor:pointer;outline:none">';
    availYears.forEach(function(y) { html += '<option value="' + y + '"' + (parseInt(y) === _selectedYear ? ' selected' : '') + '>' + y + '</option>'; });
    html += '      </select>';
    html += '    </div>';
    html += '    <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();openMonthlyForm(null)">+ 记录</button>';
    html += '  </div>';
    // 收入大字（主角）
    html += '  <div style="margin-bottom:var(--sp-md)">';
    html += '    <div style="font-size:28px;font-weight:700;color:var(--color-up);letter-spacing:-0.5px;font-variant-numeric:tabular-nums">¥' + fmtNum(latest.income) + '</div>';
    html += '    <div style="font-size:var(--fs-xs);color:var(--text-muted);margin-top:2px">收入</div>';
    html += '  </div>';
    // 底部三栏（配角）
    html += '  <div style="display:flex;justify-content:space-between;padding-top:var(--sp-sm);border-top:1px solid var(--glass-border)">';
    html += '    <div style="text-align:center;flex:1"><div style="font-size:var(--fs-md);font-weight:700;color:var(--color-down)">¥' + fmtNum(latest.expense) + '</div><div style="font-size:var(--fs-xs);color:var(--text-muted);margin-top:2px">支出</div></div>';
    html += '    <div style="text-align:center;flex:1"><div style="font-size:var(--fs-md);font-weight:700" class="' + pnlClass(latest.surplus) + '">¥' + fmtNum(latest.surplus) + '</div><div style="font-size:var(--fs-xs);color:var(--text-muted);margin-top:2px">盈余</div></div>';
    html += '    <div style="text-align:center;flex:1"><div style="font-size:var(--fs-md);font-weight:700;color:var(--color-warn)">' + latest.rate + '%</div><div style="font-size:var(--fs-xs);color:var(--text-muted);margin-top:2px">储蓄率</div></div>';
    html += '  </div>';
    // 明细区（点击卡片展开）
    html += '  <div id="ieHeroDetail" style="display:none;margin-top:var(--sp-sm);padding-top:var(--sp-sm);border-top:1px solid var(--glass-border)">';
    html += _buildMonthDetail(monthMap[latestMonth] || [], latestMonth);
    html += '  </div>';
    html += '</div>';

    // ── 年度收支趋势图（迷你柱状图）──
    var yearIncome = 0, yearExpense = 0;
    var monthBars = [];
    for (var m = 1; m <= 12; m++) {
      var ym = yearStr + '-' + String(m).padStart(2, '0');
      var stats = _calcMonthStats(allRecords, ym);
      monthBars.push({ month: m, ym: ym, income: stats.income, expense: stats.expense, surplus: stats.surplus });
      yearIncome += stats.income;
      yearExpense += stats.expense;
    }
    var maxVal = 1;
    monthBars.forEach(function(b) { maxVal = Math.max(maxVal, b.income, b.expense); });

    html += '<div class="ie-chart-card">';
    html += '  <div style="font-size:var(--fs-xs);color:var(--text-muted);margin-bottom:var(--sp-sm)">年度趋势</div>';
    // SVG 线状趋势图（盈余折线）— 用 xMidYMid meet 保持圆形不变形
    var maxSurplus = 1;
    monthBars.forEach(function(b) { maxSurplus = Math.max(maxSurplus, Math.abs(b.surplus)); });
    var svgW = 360, svgH = 80, padY = 12, midY = svgH / 2;
    var pts = [];
    monthBars.forEach(function(b, i) {
      var x = 15 + i * ((svgW - 30) / 11);
      var y = midY - (b.surplus / (maxSurplus || 1)) * (svgH / 2 - padY);
      pts.push({ x: x, y: y, ym: b.ym, surplus: b.surplus });
    });
    html += '<svg viewBox="0 0 ' + svgW + ' ' + svgH + '" style="width:100%;height:80px;margin-bottom:4px;overflow:visible" preserveAspectRatio="xMidYMid meet">';
    // 渐变填充区域（折线下方半透明）
    html += '<defs></defs>';
    // 零线
    html += '<line x1="0" y1="' + midY + '" x2="' + svgW + '" y2="' + midY + '" stroke="rgba(94,102,115,0.2)" stroke-width="0.5" stroke-dasharray="4,3"/>';
    // 折线
    html += '<polyline points="' + pts.map(function(p) { return p.x + ',' + p.y; }).join(' ') + '" fill="none" stroke="var(--color-warn)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
    // 可点击圆点
    pts.forEach(function(p) {
      var isA = p.ym === latestMonth, hasD = p.surplus !== 0;
      var r = isA ? 6 : (hasD ? 3.5 : 2.5);
      var fill = isA ? 'var(--color-warn)' : (hasD ? 'var(--bg-card-solid,#1E2026)' : 'rgba(94,102,115,0.3)');
      var strokeC = hasD ? 'var(--color-warn)' : 'rgba(94,102,115,0.3)';
      // 选中月份加光晕
      if (isA) html += '<circle cx="' + p.x + '" cy="' + p.y + '" r="10" fill="rgba(240,185,11,0.15)" stroke="none"/>';
      html += '<circle cx="' + p.x + '" cy="' + p.y + '" r="' + r + '" fill="' + fill + '" stroke="' + strokeC + '" stroke-width="2" style="cursor:pointer" onclick="switchActiveMonth(\'' + p.ym + '\')"/>';
    });
    html += '</svg>';
    html += '  <div class="ie-bar-chart">';
    monthBars.forEach(function(b) {
      var incH = Math.round(b.income / maxVal * 48) || 0;
      var expH = Math.round(b.expense / maxVal * 48) || 0;
      var isLatest = b.ym === latestMonth;
      html += '    <div class="ie-bar-col' + (isLatest ? ' ie-bar-active' : '') + '" onclick="switchActiveMonth(\'' + b.ym + '\')">';
      html += '      <div class="ie-bar-pair">';
      html += '        <div class="ie-bar ie-bar-inc" style="height:' + incH + 'px"></div>';
      html += '        <div class="ie-bar ie-bar-exp" style="height:' + expH + 'px"></div>';
      html += '      </div>';
      html += '      <div class="ie-bar-label">' + b.month + '月</div>';
      html += '    </div>';
    });
    html += '  </div>';
    // 图例
    html += '  <div style="display:flex;gap:var(--sp-md);justify-content:center;margin-top:var(--sp-xs)">';
    html += '    <span style="font-size:10px;color:var(--text-muted)"><span style="display:inline-block;width:8px;height:8px;background:var(--color-up);border-radius:2px;margin-right:3px"></span>收入</span>';
    html += '    <span style="font-size:10px;color:var(--text-muted)"><span style="display:inline-block;width:8px;height:8px;background:var(--color-down);border-radius:2px;margin-right:3px"></span>支出</span>';
    html += '    <span style="font-size:10px;color:var(--text-muted)"><span style="display:inline-block;width:8px;height:1.5px;background:var(--color-warn);margin-right:3px;vertical-align:middle"></span>盈余</span>';
    html += '  </div>';
    html += '</div>';

    // ── 全年汇总（一行）──
    var yearSavingsRate = yearIncome > 0 ? Math.round((yearIncome - yearExpense) / yearIncome * 100) : 0;
    html += '<div class="ie-year-summary">';
    html += '  <span>' + yearStr + '年合计</span>';
    html += '  <span>收入 <b style="color:var(--color-up)">¥' + fmtNum(yearIncome) + '</b></span>';
    html += '  <span>支出 <b style="color:var(--color-down)">¥' + fmtNum(yearExpense) + '</b></span>';
    html += '  <span class="' + pnlClass(yearIncome - yearExpense) + '"><b>¥' + fmtNum(yearIncome - yearExpense) + '</b></span>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}

/* 构建单月明细内容 */
function _buildMonthDetail(group, ym) {
  if (!group || group.length === 0) return '<div style="color:var(--text-muted);font-size:var(--fs-xs);text-align:center">无数据</div>';
  var html = '';
  group.forEach(function(r) {
    var income = r.income || 0;
    var totalExp = 0;
    var cats = r.expenseCategories || {};
    for (var k in cats) totalExp += (cats[k] || 0);
    if (totalExp === 0 && r.expense) totalExp = r.expense;
    var uid = r.yearMonth.replace('-', '') + (r.person || '').replace(/[^a-zA-Z\u4e00-\u9fa5]/g, '');

    // 多人标签
    var personLabel = r.person && r.person !== 'family' ? r.person : '';
    if (group.length > 1 || personLabel) {
      html += '<div style="font-size:var(--fs-xs);font-weight:600;color:var(--color-warn);margin-bottom:var(--sp-xs);padding-top:var(--sp-xs);border-top:1px dashed var(--glass-border)">' + (personLabel || '家庭合计') + '</div>';
    }

    // 收/支 Tab
    html += '<div class="h-view-tabs" style="margin-bottom:var(--sp-sm)">';
    html += '  <div class="hvt-item active" onclick="event.stopPropagation();switchIncExpTab(this,\'' + uid + '\',\'inc\')">收入</div>';
    html += '  <div class="hvt-item" onclick="event.stopPropagation();switchIncExpTab(this,\'' + uid + '\',\'exp\')">支出</div>';
    html += '</div>';
    // 收入明细
    var incItems = r.incomeItems || [];
    var incCats = r.incomeCategories || {};
    html += '<div id="inc_' + uid + '">';
    if (incItems.length > 0) {
      incItems.forEach(function(item) {
        var catName = findCatName(INCOME_CATEGORIES, item.category);
        html += '<div class="expense-cat-row"><span class="expense-cat-name">' + catName + (item.label ? ' · ' + escHtml(item.label) : '') + '</span><span class="expense-cat-amount" style="color:var(--color-up)">¥' + fmtNum(item.amount) + '</span></div>';
      });
    } else {
      INCOME_CATEGORIES.forEach(function(cat) {
        var amt = incCats[cat.key] || 0;
        if (amt > 0) {
          var note = (r.incomeNotes && r.incomeNotes[cat.key]) ? ' · ' + escHtml(r.incomeNotes[cat.key]) : '';
          html += '<div class="expense-cat-row"><span class="expense-cat-name">' + cat.name + note + '</span><span class="expense-cat-amount" style="color:var(--color-up)">¥' + fmtNum(amt) + '</span></div>';
        }
      });
    }
    // 收入环形饼图
    if (income > 0) {
      var incPieData = [];
      var incPieColors = ['#F6465D','#F59E0B','#3B82F6','#8B5CF6','#0ECB81','#EC4899'];
      var ici = 0;
      if (incItems.length > 0) {
        incItems.forEach(function(item) {
          var catName = findCatName(INCOME_CATEGORIES, item.category);
          incPieData.push({ name: catName + (item.label ? '·' + item.label : ''), amount: item.amount, color: incPieColors[ici % incPieColors.length] });
          ici++;
        });
      } else {
        INCOME_CATEGORIES.forEach(function(cat) {
          var amt = incCats[cat.key] || 0;
          if (amt > 0) { incPieData.push({ name: cat.name, amount: amt, color: incPieColors[ici % incPieColors.length] }); }
          ici++;
        });
      }
      if (incPieData.length > 0) {
        var ipR = 40, ipC = 50, ipS = 12, ipCirc = 2 * Math.PI * ipR, ipOff = 0;
        html += '<div style="display:flex;align-items:center;gap:var(--sp-md);margin-top:var(--sp-sm);padding-top:var(--sp-sm);border-top:1px dashed var(--glass-border)" onclick="event.stopPropagation()">';
        html += '<svg viewBox="0 0 100 100" style="width:80px;height:80px;flex-shrink:0;transform:rotate(-90deg)">';
        incPieData.forEach(function(d) {
          var dash = (d.amount / income) * ipCirc;
          html += '<circle cx="' + ipC + '" cy="' + ipC + '" r="' + ipR + '" fill="none" stroke="' + d.color + '" stroke-width="' + ipS + '" stroke-dasharray="' + dash + ' ' + (ipCirc - dash) + '" stroke-dashoffset="-' + ipOff + '"/>';
          ipOff += dash;
        });
        html += '</svg>';
        html += '<div style="flex:1;font-size:var(--fs-xs)">';
        incPieData.forEach(function(d) {
          html += '<div style="display:flex;align-items:center;gap:4px;padding:1px 0"><span style="width:6px;height:6px;border-radius:50%;background:' + d.color + ';flex-shrink:0"></span><span style="color:var(--text-secondary);flex:1">' + d.name + '</span><span style="color:var(--text-primary);font-weight:500">¥' + fmtNum(d.amount) + '</span><span style="color:var(--text-muted);min-width:28px;text-align:right">' + Math.round(d.amount / income * 100) + '%</span></div>';
        });
        html += '</div></div>';
      }
    }
    html += '</div>';
    // 支出明细
    var expItems = r.expenseItems || [];
    html += '<div id="exp_' + uid + '" style="display:none">';
    if (expItems.length > 0) {
      expItems.forEach(function(item) {
        var catName = findCatName(EXPENSE_CATEGORIES, item.category);
        html += '<div class="expense-cat-row"><span class="expense-cat-name">' + catName + (item.label ? ' · ' + escHtml(item.label) : '') + '</span><span class="expense-cat-amount">¥' + fmtNum(item.amount) + '</span></div>';
      });
    } else {
      EXPENSE_CATEGORIES.forEach(function(cat) {
        var amt = cats[cat.key] || 0;
        if (amt > 0) {
          var note = (r.expenseNotes && r.expenseNotes[cat.key]) ? ' · ' + escHtml(r.expenseNotes[cat.key]) : '';
          html += '<div class="expense-cat-row"><span class="expense-cat-name">' + cat.name + note + '</span><span class="expense-cat-amount">¥' + fmtNum(amt) + '</span></div>';
        }
      });
    }
    // 支出环形饼图（在支出Tab内部）
    if (totalExp > 0) {
      var pieData = [];
      var pieColors = ['#F6465D','#F0B90B','#3B82F6','#0ECB81','#8B5CF6','#F59E0B','#EC4899','#6366F1','#14B8A6','#A0AEC0'];
      var ci = 0;
      EXPENSE_CATEGORIES.forEach(function(cat) {
        var amt = cats[cat.key] || 0;
        if (amt > 0) pieData.push({ name: cat.name, amount: amt, color: pieColors[ci % pieColors.length] });
        ci++;
      });
      if (pieData.length > 0) {
        var pieR = 40, pieC = 50, stroke = 12;
        var circumference = 2 * Math.PI * pieR;
        var offset = 0;
        html += '<div style="display:flex;align-items:center;gap:var(--sp-md);margin-top:var(--sp-sm);padding-top:var(--sp-sm);border-top:1px dashed var(--glass-border)" onclick="event.stopPropagation()">';
        html += '<svg viewBox="0 0 100 100" style="width:80px;height:80px;flex-shrink:0;transform:rotate(-90deg)">';
        pieData.forEach(function(d) {
          var pct = d.amount / totalExp;
          var dash = pct * circumference;
          html += '<circle cx="' + pieC + '" cy="' + pieC + '" r="' + pieR + '" fill="none" stroke="' + d.color + '" stroke-width="' + stroke + '" stroke-dasharray="' + dash + ' ' + (circumference - dash) + '" stroke-dashoffset="-' + offset + '"/>';
          offset += dash;
        });
        html += '</svg>';
        html += '<div style="flex:1;font-size:var(--fs-xs)">';
        pieData.forEach(function(d) {
          var pct = Math.round(d.amount / totalExp * 100);
          html += '<div style="display:flex;align-items:center;gap:4px;padding:1px 0"><span style="width:6px;height:6px;border-radius:50%;background:' + d.color + ';flex-shrink:0"></span><span style="color:var(--text-secondary);flex:1">' + d.name + '</span><span style="color:var(--text-primary);font-weight:500">¥' + fmtNum(d.amount) + '</span><span style="color:var(--text-muted);min-width:28px;text-align:right">' + pct + '%</span></div>';
        });
        html += '</div></div>';
      }
    }
    html += '</div>';
    html += '<div style="text-align:center;margin-top:var(--sp-sm)"><button class="btn btn-sm" onclick="event.stopPropagation();openMonthlyForm(\'' + r.yearMonth + '\',\'' + escAttr(r.person || 'family') + '\')">编辑</button></div>';
  });
  return html;
}

function switchIncExpTab(tabEl, uid, type) {
  var tabs = tabEl.parentElement.children;
  for (var i = 0; i < tabs.length; i++) tabs[i].className = 'hvt-item';
  tabEl.className = 'hvt-item active';
  var expDiv = document.getElementById('exp_' + uid);

/* ── 月度收支表单 ── */
function openMonthlyForm(yearMonth, person) {
  if (!DATA.monthlyRecords) DATA.monthlyRecords = [];
  var isEdit = !!(yearMonth && person !== undefined);
  var rec = null;
  var recIdx = -1;
  if (yearMonth) {
    for (var i = 0; i < DATA.monthlyRecords.length; i++) {
      var r = DATA.monthlyRecords[i];
      if (r.yearMonth === yearMonth && (person === undefined || (r.person || '') === (person || ''))) {
        rec = r; recIdx = i; isEdit = true; break;
      }
    }
  }
  if (!rec) { rec = {}; isEdit = false; }
  var cats = rec.expenseCategories || {};

  // 自动预填：新记录时从最近同person的记录复制
  if (!isEdit && Object.keys(cats).length === 0) {
    var sorted = (DATA.monthlyRecords || []).slice().sort(function(a, b) { return b.yearMonth.localeCompare(a.yearMonth); });
    var prev = sorted.find(function(r) { return (!person || (r.person || 'family') === (person || 'family')); });
    if (!prev) prev = sorted[0]; // 退而求其次取最新任意记录
    if (prev) {
      cats = Object.assign({}, prev.expenseCategories || {});
      if (!rec.incomeCategories) rec.incomeCategories = Object.assign({}, prev.incomeCategories || {});
      if (!rec.incomeNotes) rec.incomeNotes = Object.assign({}, prev.incomeNotes || {});
      if (!rec.expenseNotes) rec.expenseNotes = Object.assign({}, prev.expenseNotes || {});
      if (!rec.income) rec.income = prev.income || 0;
      if (!rec.expense) rec.expense = prev.expense || 0;
    }
  }

  // 自动预填房贷车贷月供（新记录或编辑时房贷为空）
  if (!cats.mortgage && typeof DEBT_CONFIG !== 'undefined') {
    var mortgagePayment = (DEBT_CONFIG.mortgage ? DEBT_CONFIG.mortgage.payment : 0) + (DEBT_CONFIG.carLoan ? DEBT_CONFIG.carLoan.payment : 0);
    if (mortgagePayment > 0) cats.mortgage = Math.round(mortgagePayment * 100) / 100;

  var now = new Date();
  var defaultYM = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');

  var formHtml = '<div class="form-group">';

  // 记账人选择

  formHtml += '  <label class="form-label">记账人</label>';
  formHtml += '  <div style="display:flex;gap:var(--sp-sm)">';
  var persons = ['老公', '老婆', 'family'];
  var curPerson = rec.person || '';
  persons.forEach(function(p) {
    var label = p === 'family' ? '家庭合计' : p;

    formHtml += '<div class="hvt-item' + (selected ? ' active' : '') + '" onclick="selectPerson(this,\'' + p + '\')" style="flex:1;text-align:center;padding:6px 0">' + label + '</div>';
  });
  formHtml += '  </div>';
  formHtml += '  <input type="hidden" id="mfPerson" value="' + escAttr(curPerson || 'family') + '">';
  formHtml += '</div>';

  // 收/支 Tab 切换

  formHtml += '  <div class="hvt-item active" onclick="switchFormTab(this,\'income\')">收入</div>';
  formHtml += '  <div class="hvt-item" onclick="switchFormTab(this,\'expense\')">支出</div>';
  formHtml += '</div>';

  // 收入区
  var incCats = rec.incomeCategories || {};
  formHtml += '<div id="formTabIncome">';
  formHtml += '<div class="form-group">';
  formHtml += '  <label class="form-label">收入总额（自动计算）</label>';
  formHtml += '  <input class="form-input" id="mfIncome" type="text" value="' + (rec.income || 0) + '" readonly style="opacity:0.5;pointer-events:none">';

  INCOME_CATEGORIES.forEach(function(cat) {

    formHtml += '  <div style="display:flex;align-items:center;gap:var(--sp-xs)">';
    formHtml += '    <span style="font-size:var(--fs-sm);min-width:80px">' + cat.name + '</span>';
    formHtml += '    <input class="form-input" id="mfInc_' + cat.key + '" type="number" step="0.01" value="' + catVal + '" placeholder="0" style="flex:1" oninput="updateFormTotals()">';
    formHtml += '    <input class="form-input" id="mfIncNote_' + cat.key + '" value="' + escAttr(catNote) + '" placeholder="备注" style="width:70px;font-size:var(--fs-xs)">';
    formHtml += '  </div>';
    formHtml += '</div>';
  });
  formHtml += '</div>';

  // 支出区
  formHtml += '<div id="formTabExpense" style="display:none">';
  formHtml += '<div class="form-group">';
  formHtml += '  <label class="form-label">支出总额（自动计算）</label>';
  formHtml += '  <input class="form-input" id="mfExpense" type="text" value="' + (rec.expense || 0) + '" readonly style="opacity:0.5;pointer-events:none">';
  formHtml += '</div>';
  EXPENSE_CATEGORIES.forEach(function(cat) {
    var catVal = cats[cat.key] || '';
    var catNote = (rec.expenseNotes && rec.expenseNotes[cat.key]) || '';

    formHtml += '  <div style="display:flex;align-items:center;gap:var(--sp-xs)">';

    formHtml += '<div style="margin-top:var(--sp-lg);text-align:center">';
    formHtml += '  <button class="btn btn-danger btn-sm" onclick="deleteMonthlyRecord(\'' + yearMonth + '\')">删除此记录</button>';
    formHtml += '</div>';
  }

  openAccountModal(isEdit ? '编辑 ' + (rec.person || '') + ' ' + yearMonth : '记录月度收支', formHtml, function() {
    var ym = document.getElementById('mfYearMonth').value.trim();
    if (!ym || !/^\d{4}-\d{2}$/.test(ym)) { showToast('月份格式：2026-04'); return false; }
    var personVal = (document.getElementById('mfPerson') || {}).value || 'family';
    var income = 0;

    var incCatsData = {};
    var incNotesData = {};
    INCOME_CATEGORIES.forEach(function(cat) {
      var v = parseFloat(document.getElementById('mfInc_' + cat.key).value) || 0;
      if (v > 0) { incCatsData[cat.key] = v; income += v; }
      var note = (document.getElementById('mfIncNote_' + cat.key) || {}).value || '';
      if (note.trim()) incNotesData[cat.key] = note.trim();
    });

    var expCatsData = {};
    var expNotesData = {};
    var totalExp = 0;
    EXPENSE_CATEGORIES.forEach(function(cat) {
      var v = parseFloat(document.getElementById('mfCat_' + cat.key).value) || 0;
      if (v > 0) { expCatsData[cat.key] = v; totalExp += v; }
      var note = (document.getElementById('mfCatNote_' + cat.key) || {}).value || '';
      if (note.trim()) expNotesData[cat.key] = note.trim();
    });

    var data = {
      yearMonth: ym,
      person: personVal,
      income: income,
      incomeCategories: incCatsData,
      incomeNotes: incNotesData,
      expense: totalExp,
      expenseCategories: expCatsData,
      expenseNotes: expNotesData
    };

    if (isEdit) {
      DATA.monthlyRecords[recIdx] = data;
    } else {
      // 重复检测：同月+同人才算重复
      for (var j = 0; j < DATA.monthlyRecords.length; j++) {
        var existing = DATA.monthlyRecords[j];
        if (existing.yearMonth === ym && (existing.person || '') === personVal) {
          closeAccountModal();

          setTimeout(function() { openMonthlyForm(ym, personVal); }, 300);

      DATA.monthlyRecords.push(data);

    DATA.monthlyRecords.sort(function(a, b) { return a.yearMonth.localeCompare(b.yearMonth); });
    saveData();
    renderAccount();

/* ── 查还款表，算当前余额 ── */
function getDebtCurrentInfo(debtConf) {
  var schedule = debtConf.schedule || [];
  if (schedule.length === 0) {
    return { currentBalance: 0, paidPeriods: debtConf.basePaid, remainingPeriods: 0, nextPayDate: '--' };
  }

  var today = new Date();
  var baseDate = new Date(debtConf.baseDate + 'T00:00:00');
  var basePaid = debtConf.basePaid;
  var payDay = debtConf.payDay;
  var baseUnpaid = debtConf.baseUnpaid; // true=基准日当月未还

  // 从基准月开始数过了几个还款日
  var paidSince = 0;

  // 基准月的年月
  var baseY = baseDate.getFullYear();
  var baseM = baseDate.getMonth(); // 0-based

  // 如果基准日当月未还，从当月的还款日开始数
  var startY = baseY, startM = baseM;
  if (!baseUnpaid) {
    // 当月已还，从下个月开始数
    startM++;
    if (startM > 11) { startM = 0; startY++; }
  }

  // 从startY/startM开始，每个月payDay，数到today
  var checkY = startY, checkM = startM;
  while (true) {
    var payDate = new Date(checkY, checkM, payDay);
    if (payDate > today) break;
    paidSince++;
    checkM++;
    if (checkM > 11) { checkM = 0; checkY++; }
    // 安全限制
    if (paidSince > schedule.length) break;
  }

  // 已还总期数
  var totalPaid = basePaid + paidSince;

  // 查表取余额
  var currentBalance;
  if (paidSince === 0) {
    // 还没还过新的期，余额就是表第一条的还前余额
    currentBalance = schedule[0][1]; // before
  } else if (paidSince <= schedule.length) {
    // 取第paidSince条的还后余额（索引从0开始）
    currentBalance = schedule[paidSince - 1][4]; // after
  } else {
    currentBalance = 0;
  }

  var remainingPeriods = debtConf.totalPeriods - totalPaid;
  if (remainingPeriods < 0) remainingPeriods = 0;

  // 下次还款日
  var nextPayDate = new Date(checkY, checkM, payDay);
  var nextStr = (nextPayDate.getMonth() + 1) + '/' + nextPayDate.getDate();

  return {
    currentBalance: currentBalance,
    paidPeriods: totalPaid,
    remainingPeriods: remainingPeriods,
    nextPayDate: nextStr
  };
}

function fmtNum(n) {

function escHtml(s) {

function escAttr(s) {

}
function findCatName(cats, key) {

/* ── 导出/导入/重置（复用） ── */
function handleExport() {
  try {
    // 导出时附带当前汇率，方便跨版本导入
    var exportData = JSON.parse(JSON.stringify(DATA));
    exportData.fx = { USDCNY: USDCNY, HKDCNY: HKDCNY };
    var json = JSON.stringify(exportData, null, 2);
    var blob = new Blob([json], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'dashboard_data_' + new Date().toISOString().slice(0, 10) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('数据已导出');
  } catch (e) {
    showToast('导出失败: ' + e.message);
  }
}

function handleImport(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var imported = JSON.parse(e.target.result);
      // 完全替换 DATA（而非浅合并），避免残留旧字段
      DATA = imported;
      // 刷新版本号为当前版本，防止刷新后被版本迁移覆盖
      DATA.meta = DATA.meta || {};
      DATA.meta.version = DATA_VERSION;
      DATA.meta.updatedAt = new Date().toISOString();
      // 同步汇率：如果导入数据中有汇率信息则更新全局变量
      if (imported.fx) {
        if (imported.fx.USDCNY) USDCNY = imported.fx.USDCNY;
        if (imported.fx.HKDCNY) HKDCNY = imported.fx.HKDCNY;
      }
      saveData();
      showToast('数据已导入，共 ' + (DATA.holdings || []).length + ' 只持仓');
      renderDashboard();
      renderHoldings();
      renderAccount();
      renderPlan();
      renderStatusBar();
    } catch (err) {
      showToast('导入失败: JSON格式错误');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function renderPlanExecute() {
  var html = '';

  // ── 1. 执行计划（已完成步骤自动折叠）──

  var steps = DATA.tasks || [];
  if (steps.length) {
    steps.forEach(function(step, si) {
      var items = step.items || [];
      var allDone = items.length > 0 && items.every(function(it) { return it.done; });
      var anyDone = items.some(function(it) { return it.done; });
      var cls = allDone ? 'done' : anyDone ? 'active' : '';
      var collapsed = allDone ? ' collapsed' : '';

      html += '<div class="tl-step ' + cls + collapsed + '">';
      html += '  <div class="tl-dot"></div>';

      html += '    <span style="font-size:var(--fs-xs);color:var(--text-muted);margin-left:var(--sp-sm)">';
      var doneC = items.filter(function(it) { return it.done; }).length;
      html += doneC + '/' + items.length;
      html += allDone ? ' ✓' : '';
      html += '    </span>';
      html += '  </div>';
      html += '  <div class="task-list">';

      items.forEach(function(item, ii) {
        var doneCls = item.done ? 'done' : '';
        html += '<div class="task-item ' + doneCls + '" style="display:flex;align-items:center;gap:var(--sp-xs)">';
        html += '  <div class="task-check" onclick="toggleTask(' + si + ',' + ii + ')"></div>';
        html += '  <span class="task-text" style="flex:1" onclick="toggleTask(' + si + ',' + ii + ')">' + (item.text || '--') + '</span>';

function renderCollapsible(title, defaultOpen, contentFn) {
  var id = 'coll_' + title.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '');
  var html = '<div class="collapsible-section" style="margin-top:var(--sp-md)">';

  html += '    <span style="font-weight:var(--fw-semibold);font-size:var(--fs-sm);color:var(--text-primary)">' + title + '</span>';
  html += '    <span id="' + id + '_arrow" style="color:var(--text-muted);font-size:12px">' + (defaultOpen ? '▴' : '▾') + '</span>';
  html += '  </div>';
  html += '  <div id="' + id + '" style="display:' + (defaultOpen ? 'block' : 'none') + ';padding:var(--sp-sm) 0">';

function toggleCollapsible(id) {
  var el = document.getElementById(id);
  var arrow = document.getElementById(id + '_arrow');
  if (!el) return;
  var isHidden = el.style.display === 'none';
  el.style.display = isHidden ? 'block' : 'none';
  if (arrow) arrow.textContent = isHidden ? '▴' : '▾';
}

function toggleTask(stepIdx, itemIdx) {

  DATA.tasks[stepIdx].items[itemIdx].done = !DATA.tasks[stepIdx].items[itemIdx].done;

async function addTask(stepIdx) {

async function deleteTask(stepIdx, itemIdx) {

/* ================================================================
   实时行情引擎
   - 股票行情：腾讯财经 qt.gtimg.cn（HTTPS JSONP，A/港/美全覆盖）
   - 汇率：open.er-api.com（HTTPS CORS，免费无 key）
   ================================================================ */

/**
 * 腾讯财经 JSONP — 用 <script> 标签注入
 * 返回格式：var v_sh600900="..."; （A股逗号分隔）
 *          var v_r_hk00005="..."; （港股波浪号分隔）
 *          var v_usHSBC="...";    （美股波浪号分隔）
 */
function _qqJsonp(url, timeout) {
  var ms = timeout || 8000;
  return new Promise(function(resolve, reject) {
    var script = document.createElement('script');
    script.charset = 'utf-8';
    script.src = url;
    var timer = setTimeout(function() {
      cleanup();
      reject(new Error('timeout'));
    }, ms);
    function cleanup() {
      clearTimeout(timer);
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    script.onload = function() { cleanup(); resolve(true); };
    script.onerror = function() { cleanup(); reject(new Error('script error')); };
    document.head.appendChild(script);
  });
}

/**
 * 构建腾讯财经代码列表
 */
function _buildQQSymbols(holdings) {
  var symbols = [];
  (holdings || []).forEach(function(h) {
    var code = h.code;
    var market = h.market;
    if (!code) return;
    if (market === 'A') {
      symbols.push((code.startsWith('6') || code.startsWith('5')) ? 'sh' + code : 'sz' + code);
    } else if (market === '港') {
      symbols.push('r_hk' + code);
    } else if (market === '美') {
      // 腾讯美股: us + ticker（大小写保留）
      symbols.push('us' + code.replace('-', '.'));
    }
  });
  return symbols;
}

/**
 * 从 window 全局变量解析腾讯行情
 */
function _parseQQVars(holdings) {
  var updated = 0;
  (holdings || []).forEach(function(h) {
    var code = h.code;
    var market = h.market;
    if (!code) return;

    var varName = '';
    if (market === 'A') {
      varName = 'v_' + ((code.startsWith('6') || code.startsWith('5')) ? 'sh' + code : 'sz' + code);
    } else if (market === '港') {
      varName = 'v_r_hk' + code;
    } else if (market === '美') {
      varName = 'v_us' + code.replace('-', '.');
    }

    var val = null;
    try { val = window[varName]; } catch(e) {}
    if (!val || typeof val !== 'string' || val.length < 5) return;

    var price = 0;

    if (market === 'A') {
      // A股：逗号分隔，fields[3] = 当前价
      var aFields = val.split(',');
      if (aFields.length > 3) price = parseFloat(aFields[3]) || 0;
    } else if (market === '港') {
      // 港股：波浪号分隔，fields[6] = 当前价
      var hkFields = val.split('~');
      if (hkFields.length > 6) price = parseFloat(hkFields[6]) || 0;
    } else if (market === '美') {
      // 美股：波浪号分隔，fields[1] = 中文名, fields[2] = 代码, fields[3] = 当前价
      var usFields = val.split('~');
      if (usFields.length > 3) {
        // 尝试 fields[3] 先（有些版本当前价在这）
        var p3 = parseFloat(usFields[3]);
        if (p3 > 0) {
          price = p3;
        } else {
          // fallback: 遍历找一个合理的数值
          for (var i = 1; i < Math.min(usFields.length, 10); i++) {
            var pv = parseFloat(usFields[i]);
            if (pv > 1) { price = pv; break; }
          }
        }
      }
    }

    if (price > 0) {
      h.currentPrice = String(price);
      updated++;
    }

    // 清理全局变量
    try { delete window[varName]; } catch(e) {}
  });

  return updated;
}

/**
 * 拉实时汇率 — open.er-api.com (免费 CORS HTTPS)
 * 返回 { USDCNY: number, HKDCNY: number }
 */
function fetchFXRates() {
  return fetch('https://open.er-api.com/v6/latest/USD')
    .then(function(res) { return res.json(); })
    .then(function(data) {
      var rates = {};
      if (data && data.rates) {
        if (data.rates.CNY) {
          rates.USDCNY = Math.round(data.rates.CNY * 10000) / 10000;
        }
        if (data.rates.HKD && data.rates.CNY) {
          // HKD/CNY = CNY/USD ÷ HKD/USD = rates.CNY / rates.HKD
          rates.HKDCNY = Math.round((data.rates.CNY / data.rates.HKD) * 10000) / 10000;
        }
      }
      return rates;
    });
}

/**
 * 拉实时股票行情 — 腾讯财经 JSONP
 * 返回更新数量
 */
function fetchStockPrices() {
  if (!DATA || !DATA.holdings || DATA.holdings.length === 0) {
    return Promise.resolve(0);
  }
  var symbols = _buildQQSymbols(DATA.holdings);
  if (symbols.length === 0) return Promise.resolve(0);

  var url = 'https://qt.gtimg.cn/q=' + symbols.join(',');
  return _qqJsonp(url).then(function() {
    return _parseQQVars(DATA.holdings);
  });
}

/**
 * 综合拉取：行情 + 汇率（并行）
 */
function fetchLivePrices() {
  return Promise.all([
    fetchStockPrices().catch(function(e) { console.warn('[行情] 股票拉取失败:', e); return 0; }),
    fetchFXRates().catch(function(e) { console.warn('[行情] 汇率拉取失败:', e); return {}; })
  ]).then(function(results) {
    var stocksUpdated = results[0];
    var rates = results[1];

    // 更新全局汇率
    if (rates.USDCNY) USDCNY = rates.USDCNY;
    if (rates.HKDCNY) HKDCNY = rates.HKDCNY;

    // 更新时间戳
    PRICES_UPDATED_AT = new Date().toISOString();
    PRICES_STATUS = stocksUpdated > 0 ? 'ok' : 'stale';

    return { updated: stocksUpdated, rates: rates };
  });
}

/* ================================================================
   对外接口
   ================================================================ */

/** 启动时加载行情 */
function loadPriceFile() {
  fetchLivePrices()
    .then(function(result) {
      console.log('[行情] 在线刷新: ' + result.updated + '只, USD/CNY=' + USDCNY + ', HKD/CNY=' + HKDCNY);
      saveData();
      renderDashboard();
      renderHoldings();
      renderStatusBar();
    })
    .catch(function(err) {
      console.warn('[行情] 全部失败，离线模式', err);
      PRICES_STATUS = 'offline';
      renderStatusBar();
    });
}

/** 手动刷新行情按钮 */
function refreshPrices() {
  var btn = document.getElementById('refreshPriceBtn');
  if (btn) { btn.style.animation = 'spin 0.8s linear infinite'; btn.disabled = true; }

  fetchLivePrices()
    .then(function(result) {
      saveData();
      renderDashboard();
      renderHoldings();
      renderStatusBar();
      var msg = '行情已刷新 · ' + result.updated + '只';
      if (result.rates.USDCNY) msg += ' · $=' + result.rates.USDCNY;
      showToast(msg);
    })
    .catch(function(err) {
      showToast('刷新失败: ' + err.message);
      console.warn('refreshPrices failed', err);
    })
    .finally(function() {
      if (btn) { btn.style.animation = ''; btn.disabled = false; }
    });
}

/* ================================================================
   应用初始化
   ================================================================ */
function initApp() {
  loadData();
  try { recordMonthlySnapshot(true); } catch(e) {}
  renderDashboard();
  renderHoldings();
  renderLedger();
  renderPlan();
  renderStatusBar();
  // 异步拉实时行情（不阻塞首屏渲染）
  loadPriceFile();
}

document.addEventListener('DOMContentLoaded', initApp);

</script>
